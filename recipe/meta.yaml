{% set versions = {
    "2.0": "288374088b4050bf9546babdc02ddfd8d53dce8e5b86e0762241acb425551f23"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'cuttools')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://www.ugr.es/~pittau/CutTools/cuttools_v{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}
  folder: source
  patches:
    # Only build CutTools itself -- MPFUN90/OneLOop/QCDLoop are their own
    # hep-forge packages (mpfun90, oneloop), not vendored copies from this tree.
    - build-only-cuttools-in-makefile.patch

build:
  number: 0

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('gfortran') }}
    - make
    - libtool
  host:
    - mpfun90
    - oneloop

test:
  commands:
    - test -f $PREFIX/lib/libcts.a
    - test -f $PREFIX/include/cts/def_propagator.mod

about:
  home: "https://www.ugr.es/~pittau/CutTools/"
  license: "MIT"
  license_file: source/LICENSE.txt
  summary: "CutTools: computing 1-loop amplitudes at the integrand level"
  description: |
    CutTools evaluates one-loop amplitudes at the integrand level via the
    OPP (Ossola-Papadopoulos-Pittau) reduction method, built on MPFUN90 and
    OneLOop.

extra:
  recipe-maintainers:
    - meiyasan
